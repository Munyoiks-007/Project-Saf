<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Logged Out - Mojo Electrical Enterprise</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }
    
    .logout-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    
    .logout-icon {
      font-size: 64px;
      margin-bottom: 20px;
      color: #4CAF50;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    
    p {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    .btn {
      background: #667eea;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      display: inline-block;
      transition: background 0.3s ease;
    }
    
    .btn:hover {
      background: #5a67d8;
    }
    
    .countdown {
      margin-top: 20px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="logout-container">
    <div class="logout-icon">✅</div>
    <h1>Successfully Logged Out</h1>
    <p>You have been securely logged out of your account. Thank you for using Mojo Electrical Enterprise Invoice System.</p>
    
    <a href="login.html" class="btn">Return to Login</a>
    
    <div class="countdown" id="countdown">
      Redirecting to login in <span id="seconds">10</span> seconds...
    </div>
  </div>

  <script>
    // Auto-redirect after 10 seconds
    let seconds = 10;
    const countdownElement = document.getElementById('seconds');
    
    const countdown = setInterval(() => {
      seconds--;
      countdownElement.textContent = seconds;
      
      if (seconds <= 0) {
        clearInterval(countdown);
        window.location.href = 'login.html';
      }
    }, 1000);
    
    // Optional: Clear any remaining localStorage items
    localStorage.removeItem('authToken');
    localStorage.removeItem('userData');
  </script>
</body>
</html>
