<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Invoice - Mojo Electrical Enterprise</title>

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="invoice.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Modal styles */
    #saved-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #saved-modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 800px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #2c3e50;
    }

    .modal-header h3 {
      margin: 0;
      color: #2c3e50;
    }

    .close-modal {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .close-modal:hover {
      background: #c0392b;
    }

    .invoices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .invoice-card {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 15px;
      transition: transform 0.2s;
    }

    .invoice-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .invoice-card h4 {
      margin: 0 0 10px 0;
      color: #2c3e50;
      font-size: 16px;
    }

    .invoice-card p {
      margin: 5px 0;
      font-size: 14px;
      color: #555;
    }

    .invoice-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn-pdf, .btn-view, .btn-delete {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-pdf {
      background: #e74c3c;
      color: white;
    }

    .btn-pdf:hover {
      background: #c0392b;
    }

    .btn-view {
      background: #3498db;
      color: white;
    }

    .btn-view:hover {
      background: #2980b9;
    }

    .btn-delete {
      background: #95a5a6;
      color: white;
    }

    .btn-delete:hover {
      background: #7f8c8d;
    }

    .no-invoices {
      text-align: center;
      padding: 40px;
      color: #7f8c8d;
      font-size: 16px;
    }
  </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="logo-container">
  <img src="logo.png" class="logo" alt="Mojo Electrical Logo">
  <div class="header-text">
    <h1>Mojo Electrical Enterprise</h1>
    <p>P.O. Box 98664 - 80100, Mombasa</p>
    <p>Phone: +254 721 856 011 / 0731 120 072</p>
    <p>Email: gathucimoses@gmail.com</p>
  </div>
</div>

<!-- ================= ALERT & LOADER ================= -->
<div id="alert-message" class="alert"></div>

<div id="loader" class="loader">
  <i class="fas fa-spinner fa-spin"></i>
  <p>Processing...</p>
</div>

<h2><i class="fas fa-file-invoice"></i> Invoice Creator</h2>

<!-- ================= FORM ================= -->
<form id="invoice-form">

  <div class="form-row">
    <label>
      Invoice No
      <input type="text" id="invoiceNo" readonly />
    </label>

    <label>
      Invoice Date
      <input type="date" id="invoiceDate" required />
    </label>

    <label>
      Due Date
      <input type="date" id="dueDate" />
    </label>
  </div>

  <div class="form-row">
    <label>
      Client Name
      <input type="text" id="clientName" required />
    </label>

    <label>
      Client Email
      <input type="email" id="clientEmail" />
    </label>

    <label>
      Client Phone
      <input type="tel" id="clientPhone" />
    </label>
  </div>

  <div class="form-row">
    <label>
      Client Address
      <textarea id="clientAddress" rows="2"></textarea>
    </label>
  </div>

  <!-- ================= ITEMS ================= -->
  <h3>Items</h3>

  <div id="items">
    <div class="item">
      <input class="item-name" placeholder="Item name" required />
      <input class="item-description" placeholder="Description" />
      <input type="number" class="item-quantity" min="0.01" step="0.01" placeholder="Qty" required />
      <input type="number" class="item-price" min="0" step="0.01" placeholder="Unit Price" required />
      <button type="button" class="remove-item">
        <i class="fas fa-trash"></i>
      </button>
    </div>
  </div>

  <button type="button" id="add-item">
    <i class="fas fa-plus"></i> Add Item
  </button>

  <!-- ================= TOTALS ================= -->
  <div class="totals">

    <div class="form-row">
      <label>
        Tax (% – optional)
        <input type="number" id="taxRate" min="0" step="0.01" placeholder="e.g. 16" />
      </label>
    </div>

    <h3>Subtotal: <span id="subtotal-display">KES 0.00</span></h3>
    <h3>Tax: <span id="tax-display">KES 0.00</span></h3>
    <h3>Total: <span id="total-display">KES 0.00</span></h3>
  </div>

  <div class="form-row">
    <label>
      Notes
      <textarea id="notes" rows="3"></textarea>
    </label>
  </div>

  <!-- ================= ACTIONS ================= -->
  <div class="form-actions">
    <button type="button" id="generate-invoice-no">
      <i class="fas fa-bolt"></i> Generate Invoice No
    </button>

    <button type="submit">
      <i class="fas fa-save"></i> Save Invoice
    </button>

    <button type="button" id="viewSavedBtn">
      <i class="fas fa-list"></i> View Saved Invoices
    </button>

    <button type="button" id="download-pdf">
      <i class="fas fa-file-pdf"></i> Download PDF
    </button>

    <button type="button" id="logout">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>
</form>

<!-- ================= SAVED INVOICES MODAL ================= -->
<div id="saved-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-file-invoice"></i> Saved Invoices</h3>
      <button class="close-modal"><i class="fas fa-times"></i> Close</button>
    </div>
    <div id="invoices-list"></div>
  </div>
</div>

<div id="view-modal" class="saved-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Invoice Details</h3>
      <button class="close-modal" onclick="closeViewModal()">Close</button>
    </div>
    <div id="view-invoice-content"></div>
  </div>
</div>




<!-- ================= SCRIPT ================= -->
<script>
/* ================= CONFIG ================= */
const API_BASE_URL = window.location.origin + '/mojo/api';

/* ================= VIEW INVOICE ================= */
async function viewInvoice(invoiceId) {
  try {
    showLoader(true);

    const res = await fetch(`${API_BASE_URL}/get_invoice.php?id=${invoiceId}`);
    const data = await res.json();

    if (!data.success) {
      showAlert(data.error || 'Failed to load invoice', 'error');
      return;
    }

    const inv = data.invoice;
    const items = data.items;

    let rows = '';
    items.forEach((i, index) => {
      rows += `
        <tr>
          <td>${index + 1}</td>
          <td>${i.item}</td>
          <td>${i.description}</td>
          <td>${i.quantity}</td>
          <td>KES ${parseFloat(i.unit_price).toFixed(2)}</td>
          <td>KES ${parseFloat(i.total).toFixed(2)}</td>
        </tr>
      `;
    });

    document.getElementById('view-invoice-content').innerHTML = `
      <p><strong>Invoice No:</strong> ${inv.invoice_no}</p>
      <p><strong>Client:</strong> ${inv.client_name}</p>
      <p><strong>Date:</strong> ${inv.invoice_date}</p>

      <table border="1" width="100%" cellpadding="6">
        <tr>
          <th>#</th>
          <th>Item</th>
          <th>Description</th>
          <th>Qty</th>
          <th>Unit</th>
          <th>Total</th>
        </tr>
        ${rows}
      </table>

      <h3 style="text-align:right">
        Total: KES ${parseFloat(inv.total).toFixed(2)}
      </h3>

      <button onclick="downloadPDF(${inv.id})" class="btn-pdf">
        <i class="fas fa-file-pdf"></i> Download PDF
      </button>
    `;

    document.getElementById('view-modal').style.display = 'flex';

  } catch (e) {
    console.error(e);
    showAlert('Server error loading invoice', 'error');
  } finally {
    showLoader(false);
  }
}

function closeViewModal() {
  document.getElementById('view-modal').style.display = 'none';
}

/* ================= HELPERS ================= */
const alertBox = document.getElementById('alert-message');
const loader = document.getElementById('loader');
const savedModal = document.getElementById('saved-modal');
const invoicesList = document.getElementById('invoices-list');

function showAlert(msg, type = 'info') {
  alertBox.textContent = msg;
  alertBox.className = `alert alert-${type}`;
  alertBox.style.display = 'block';
  setTimeout(() => alertBox.style.display = 'none', 4000);
}

function showLoader(show) {
  loader.style.display = show ? 'block' : 'none';
}

function showModal(show) {
  savedModal.style.display = show ? 'flex' : 'none';
  savedModal.classList.toggle('active', show);
}

/* ================= DATES ================= */
document.getElementById('invoiceDate').valueAsDate = new Date();
const due = new Date(); due.setDate(due.getDate() + 30);
document.getElementById('dueDate').valueAsDate = due;

/* ================= INVOICE NO ================= */
async function generateInvoiceNumber() {
  try {
    const res = await fetch(`${API_BASE_URL}/invoice-number`);
    const data = await res.json();
    document.getElementById('invoiceNo').value = data.invoice_no;
  } catch {
    const d = new Date();
    document.getElementById('invoiceNo').value =
      `INV-${d.getFullYear()}${d.getMonth()+1}${d.getDate()}-${Math.floor(Math.random()*1000)}`;
  }
}

/* ================= TOTALS ================= */
function calculateTotals() {
  let subtotal = 0;

  document.querySelectorAll('.item').forEach(item => {
    const q = parseFloat(item.querySelector('.item-quantity').value) || 0;
    const p = parseFloat(item.querySelector('.item-price').value) || 0;
    subtotal += q * p;
  });

  const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
  const tax = subtotal * taxRate / 100;
  const total = subtotal + tax;

  document.getElementById('subtotal-display').textContent = `KES ${subtotal.toFixed(2)}`;
  document.getElementById('tax-display').textContent = `KES ${tax.toFixed(2)}`;
  document.getElementById('total-display').textContent = `KES ${total.toFixed(2)}`;

  return { subtotal, tax, taxRate, total };
}

/* ================= ITEMS ================= */
document.getElementById('add-item').onclick = () => {
  const div = document.createElement('div');
  div.className = 'item';
  div.innerHTML = `
    <input class="item-name" placeholder="Item name" required />
    <input class="item-description" placeholder="Description" />
    <input type="number" class="item-quantity" min="0.01" step="0.01" placeholder="Qty" required />
    <input type="number" class="item-price" min="0" step="0.01" placeholder="Unit Price" required />
    <button type="button" class="remove-item"><i class="fas fa-trash"></i></button>
  `;
  document.getElementById('items').appendChild(div);

  div.querySelectorAll('input').forEach(i => i.oninput = calculateTotals);
  div.querySelector('.remove-item').onclick = () => {
    div.remove();
    calculateTotals();
  };
};

document.querySelectorAll('.item input').forEach(i => i.oninput = calculateTotals);
document.querySelector('.remove-item').onclick = function () {
  if (document.querySelectorAll('.item').length > 1) {
    this.parentElement.remove();
    calculateTotals();
  }
};

/* ================= SAVE ================= */
document.getElementById('invoice-form').onsubmit = async e => {
  e.preventDefault();

  const saveBtn = document.querySelector('button[type="submit"]');
  saveBtn.disabled = true;

  const totals = calculateTotals();
  const items = [...document.querySelectorAll('.item')].map(i => ({
    item: i.querySelector('.item-name').value,
    description: i.querySelector('.item-description').value,
    quantity: parseFloat(i.querySelector('.item-quantity').value),
    unit_price: parseFloat(i.querySelector('.item-price').value),
  }));

  const payload = {
    invoice_no: invoiceNo.value,
    client_name: clientName.value,
    client_email: clientEmail.value,
    client_phone: clientPhone.value,
    client_address: clientAddress.value,
    invoice_date: invoiceDate.value,
    due_date: dueDate.value,
    subtotal: totals.subtotal,
    tax_rate: totals.taxRate,
    tax_amount: totals.tax,
    total: totals.total,
    notes: notes.value,
    items
  };

  try {
    showLoader(true);
    const res = await fetch(`${API_BASE_URL}/create_invoice.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    console.log('SERVER RESPONSE:', text);
    
    // Try to parse JSON response
    try {
      const data = JSON.parse(text);
      if (data.success) {
        showAlert('Invoice saved successfully!', 'success');
        generateInvoiceNumber(); // Generate new invoice number for next invoice
        document.getElementById('invoice-form').reset();
        document.getElementById('invoiceDate').valueAsDate = new Date();
        const due = new Date(); due.setDate(due.getDate() + 30);
        document.getElementById('dueDate').valueAsDate = due;
        calculateTotals();
      } else {
        showAlert(data.error || 'Save failed', 'error');
      }
    } catch {
      // If response is not JSON, show as plain text
      showAlert(text, text.toLowerCase().includes('success') ? 'success' : 'error');
    }
  } catch (err) {
    console.error(err);
    showAlert('Server error saving invoice', 'error');
  } finally {
    showLoader(false);
    saveBtn.disabled = false;
  }
};

/* ================= VIEW SAVED INVOICES ================= */
async function loadSavedInvoices() {
  try {
    showLoader(true);
    showModal(true);
    
    const res = await fetch(`${API_BASE_URL}/get_invoices.php`);
    const text = await res.text();
    console.log('Invoices response:', text);
    
    // Try to parse JSON
    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      console.error('Failed to parse JSON:', e);
      invoicesList.innerHTML = `<div class="no-invoices"><p>Error loading invoices. Please try again.</p></div>`;
      return;
    }
    
    if (!data.success) {
      invoicesList.innerHTML = `
        <div class="no-invoices">
          <p>${data.error || 'Failed to load invoices'}</p>
        </div>
      `;
      return;
    }
    
    if (!data.data || data.data.length === 0) {
      invoicesList.innerHTML = `
        <div class="no-invoices">
          <p><i class="fas fa-inbox"></i> No invoices found</p>
          <p>Create your first invoice above!</p>
        </div>
      `;
      return;
    }
    
    let html = '<div class="invoices-grid">';
    data.data.forEach(inv => {
      html += `
        <div class="invoice-card">
          <h4>${inv.invoice_no || 'N/A'}</h4>
          <p><strong>Client:</strong> ${inv.client_name || 'N/A'}</p>
          <p><strong>Date:</strong> ${inv.invoice_date || 'N/A'}</p>
          <p><strong>Amount:</strong> KES ${parseFloat(inv.total || 0).toFixed(2)}</p>
          <p><strong>Status:</strong> ${inv.due_date && new Date(inv.due_date) < new Date() ? 'Overdue' : 'Pending'}</p>
          <div class="invoice-actions">
            <button class="btn-pdf" onclick="downloadPDF(${inv.id})">
              <i class="fas fa-file-pdf"></i> PDF
            </button>
            <button class="btn-view" onclick="viewInvoice(${inv.id})">
              <i class="fas fa-eye"></i> View
            </button>
            <button class="btn-delete" onclick="deleteInvoice(${inv.id}, '${inv.invoice_no}')">
              <i class="fas fa-trash"></i> Delete
            </button>
          </div>
        </div>
      `;
    });
    html += '</div>';
    
    invoicesList.innerHTML = html;
    
  } catch (error) {
    console.error('Error loading invoices:', error);
    invoicesList.innerHTML = `
      <div class="no-invoices">
        <p><i class="fas fa-exclamation-triangle"></i> Server error loading invoices</p>
        <p>Please check your connection and try again</p>
      </div>
    `;
  } finally {
    showLoader(false);
  }
}

/* ================= INVOICE ACTIONS ================= */
function downloadPDF(invoiceId) {
  showAlert('Generating PDF for invoice #' + invoiceId, 'info');
  // Add your PDF generation logic here
   window.open(`${API_BASE_URL}/download_invoice.php?id=${invoiceId}`, '_blank');
}

function viewInvoice(invoiceId) {
  showAlert('Viewing invoice #' + invoiceId, 'info');
  // Add your view invoice logic here
  // window.location.href = `view_invoice.html?id=${invoiceId}`;
}

async function deleteInvoice(invoiceId, invoiceNo) {
  if (!confirm(`Are you sure you want to delete invoice ${invoiceNo}?`)) {
    return;
  }
  
  try {
    showLoader(true);
    const res = await fetch(`${API_BASE_URL}/delete_invoice.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: invoiceId })
    });
    
    const data = await res.json();
    if (data.success) {
      showAlert(`Invoice ${invoiceNo} deleted successfully`, 'success');
      loadSavedInvoices(); // Refresh the list
    } else {
      showAlert(data.error || 'Delete failed', 'error');
    }
  } catch (error) {
    console.error('Error deleting invoice:', error);
    showAlert('Server error deleting invoice', 'error');
  } finally {
    showLoader(false);
  }
}

/* ================= EVENT LISTENERS ================= */
document.addEventListener('DOMContentLoaded', () => {
  const viewSavedBtn = document.getElementById('viewSavedBtn');
  const generateInvoiceBtn = document.getElementById('generate-invoice-no');
  const downloadPdfBtn = document.getElementById('download-pdf');
  const logoutBtn = document.getElementById('logout');
  const closeModalBtn = document.querySelector('.close-modal');

  // View Saved Invoices
  viewSavedBtn.addEventListener('click', loadSavedInvoices);

  // Generate Invoice Number
  generateInvoiceBtn.addEventListener('click', generateInvoiceNumber);

  // Download PDF (current invoice)
  downloadPdfBtn.addEventListener('click', () => {
    if (!document.getElementById('invoiceNo').value) {
      showAlert('Please generate an invoice number first', 'warning');
      return;
    }
    // Add logic to download current invoice as PDF
    showAlert('PDF download feature coming soon!', 'info');
  });

  // Logout
  logoutBtn.addEventListener('click', () => {
    localStorage.removeItem('authToken');
    window.location.href = 'home.html';
  });

  // Close Modal
  closeModalBtn.addEventListener('click', () => showModal(false));

  // Close modal when clicking outside
  savedModal.addEventListener('click', (e) => {
    if (e.target === savedModal) {
      showModal(false);
    }
  });

  // Close modal with Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && savedModal.style.display === 'flex') {
      showModal(false);
    }
  });
});

/* ================= INITIALIZE ================= */
generateInvoiceNumber();
calculateTotals();

// Add input listeners for tax calculation
document.getElementById('taxRate').addEventListener('input', calculateTotals);
</script>

</body>
</html>
