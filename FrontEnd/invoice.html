<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Invoice - Mojo Electrical Enterprise</title>
  <link rel="stylesheet" href="invoice.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #2980b9;
      padding-bottom: 15px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin-right: 20px;
      object-fit: contain;
    }
    
    .header-text h1 {
      color: #2980b9;
      margin: 0;
    }
    
    .header-text p {
      margin: 5px 0 0;
      color: #555;
    }
    
    h2 {
      color: #2c3e50;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }
    
    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }
    
    .form-row label {
      flex: 1;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    
    input, button {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      width: 100%;
      box-sizing: border-box;
    }
    
    #items {
      margin: 20px 0;
    }
    
    .item {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }
    
    .item input {
      flex: 1;
    }
    
    .remove-item {
      width: auto;
      background-color: #e74c3c;
      color: white;
      border: none;
      padding: 8px 15px;
    }
    
    .remove-item:hover {
      background-color: #c0392b;
    }
    
    #add-item {
      width: auto;
      background-color: #2ecc71;
      color: white;
      border: none;
      margin-bottom: 20px;
    }
    
    #add-item:hover {
      background-color: #27ae60;
    }
    
    .totals {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 5px;
      margin: 20px 0;
    }
    
    .form-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .form-actions button {
      width: auto;
      color: white;
      border: none;
      cursor: pointer;
    }
    
    button[type="submit"] {
      background-color: #3498db;
    }
    
    button[type="submit"]:hover {
      background-color: #2980b9;
    }
    
    #download-pdf {
      background-color: #9b59b6;
    }
    
    #download-pdf:hover {
      background-color: #8e44ad;
    }
    
    #view-saved {
      background-color: #f39c12;
    }
    
    #view-saved:hover {
      background-color: #d35400;
    }
    
    #logout {
      background-color: #7f8c8d;
    }
    
    #logout:hover {
      background-color: #34495e;
    }
    
    #saved-invoices {
      list-style: none;
      padding: 0;
      margin-top: 30px;
      border-top: 1px solid #eee;
      padding-top: 20px;
    }
    
    #saved-invoices li {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
    
    #saved-invoices li:hover {
      background-color: #f8f9fa;
    }
    
    @media (max-width: 768px) {
      .form-row {
        flex-direction: column;
        gap: 10px;
      }
      
      .item {
        flex-direction: column;
        align-items: stretch;
      }
      
      .remove-item {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="logo.png" alt="Mojo Electrical Logo" class="logo" id="company-logo">
    <div class="header-text">
      <h1>Mojo Electrical Enterprise</h1>
      <p>P.O. Box 98664 - 80100, Mombasa</p>
      <p>Phone: +254 721 856 011 / 0731 120 072</p>
      <p>Email: gathucimoses@gmail.com</p>
    </div>
  </div>

  <h2>Invoice Creator</h2>

  <form id="invoice-form">
    <div class="form-row">
      <label>📄 Invoice No:
        <input type="text" id="invoiceNo" name="invoiceNo" placeholder="Will auto-generate" readonly />
      </label>

      <label>📅 Invoice Date:
        <input type="date" id="invoiceDate" name="invoiceDate" required />
      </label>
    </div>

    <div class="form-row">
      <label>👤 Client Name:
        <input type="text" id="clientName" name="clientName" placeholder="John Doe" required />
      </label>

      <label>💸 Tax Rate (%):
        <input type="number" id="taxRate" name="taxRate" placeholder="e.g. 16" min="0" max="100" step="0.01" />
      </label>
    </div>

    <h3>📦 Items</h3>
    <div id="items">
      <div class="item">
        <input type="text" name="item[]" placeholder="Item name" required />
        <input type="text" name="description[]" placeholder="Description" />
        <input type="number" name="quantity[]" placeholder="Quantity" min="1" required />
        <input type="number" name="price[]" placeholder="Unit price" min="0" step="0.01" required />
        <button type="button" class="remove-item">Remove</button>
      </div>
    </div>
    <button type="button" id="add-item">➕ Add Item</button>

    <div class="totals">
      <h3 id="subtotal-display">Subtotal: KES 0.00</h3>
      <h3 id="tax-display">Tax: KES 0.00</h3>
      <h3 id="total-display">Total: KES 0.00</h3>
    </div>

    <div class="form-actions">
      <button type="submit">💾 Save Invoice</button>
      <button type="button" id="download-pdf">📥 Download PDF</button>
      <button type="button" id="view-saved">📂 View Saved Invoices</button>
      <button type="button" id="logout">🚪 Logout</button>
    </div>
  </form>

  <ul id="saved-invoices" style="display:none;"></ul>

<script>
  // API Configuration
  const API_BASE_URL = 'http://localhost:3000/api';
  const AUTH_TOKEN = localStorage.getItem('authToken') || '';
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script>window.jsPDF = window.jspdf.jsPDF;</script>
<script src="/invoice.js"></script>

</body>
</html>
