<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Invoice - Mojo Electrical Enterprise</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="invoice.css" />
</head>
<body>

  <div class="invoice-header-left">
  <div class="logo-left">
    <img src="logo.png" alt="Mojo Electrical Logo" />
  </div>
  <div class="text-left">
    <h1>Mojo Electrical Enterprise</h1>
    <p class="slogan">Reliability in Electrical Services</p>
    <hr />
  </div>
</div>



    <header>
      <header>
  <div class="company-info">
    P.O. Box 98664 - 80100, Mombasa<br>
    Phone: +254 721 856 011 / 0731 120 072<br>
    Email: gathucimoses@gmail.com
  </div>
  <h2 class="invoice-title">Sales Invoice</h2>
</header>

      </div>
    </header>

    <section class="customer-section">
      <label>
        Client Name:
        <input type="text" id="clientName" placeholder="Customer Name" />
      </label>
      <label>
        Date:
        <input type="date" id="invoiceDate" />
      </label>
      <label>
        Invoice No:
        <input type="text" id="invoiceNumber" placeholder="e.g. INV-001" />
      </label>
    </section>

    <section class="items-section">
      <table id="itemsTable">
        <thead>
          <tr>
            <th>Description</th>
            <th>Qty</th>
            <th>Unit Price</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="itemList">
          <!-- Items will be added here -->
        </tbody>
      </table>
      <button id="addItemBtn">+ Add Item</button>
    </section>

    <section class="totals">
      <p><strong>Subtotal:</strong> KES <span id="subtotal">0.00</span></p>
      <p><strong>Total:</strong> KES <span id="total">0.00</span></p>
    </section>
    <label>
  Tax (KES):
  <input type="number" id="taxAmount" placeholder="0.00" min="0" step="0.01" />
</label>


    <button id="downloadBtn">Download PDF</button>

    <!-- Spinner -->
    <div id="spinner" style="display: none; text-align: center; margin-top: 15px;">
      <p>⏳ Generating PDF...</p>
    </div>

    <!-- Feedback -->
    <p id="feedbackMsg" style="text-align: center; font-weight: bold;"></p>
  </div>

 

  <!-- External JS file -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module" src="invoice.js"></script>

<nav>
  <a href="home.html">🏠 Home</a>
  <a href="contact.html">📩 Contact</a>

</nav>
</body>
</html>
