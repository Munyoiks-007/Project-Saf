<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Mojo Electrical Enterprise</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
  <header>
    <img src="logo.png" alt="Mojo Electrical Logo" style="height: 60px;" />
    <h1>MOJO ELECTRICAL ENTERPRISE</h1>
    <p>Reliability in Electrical Services</p>
    <nav>
      <a href="home.html">Home</a>
    </nav>
  </header>

  <section class="contact-form">
    <h2>Contact Us</h2>
    <p>Fill out the form or reach us directly.</p>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="5" maxlength="300" required></textarea>
      </div>

      <button type="submit">Send Message</button>

      <div id="loadingSpinner" class="spinner" style="display: none;"></div>
      <p id="formMessage" class="feedback-message"></p>
    </form>

    <!-- ✅ Standard WhatsApp button -->
    <a href="https://wa.me/254721856011?text=Hello%20Mojo%20Electrical%2C%20I%20am%20interested%20in%20your%20services." 
       class="whatsapp-button" 
       target="_blank">
      💬 Chat on WhatsApp
    </a>
  </section>

  <!-- ✅ Floating WhatsApp button -->
  <a href="https://wa.me/254721856011?text=Hi%20Mojo%20Electrical!%20I%20need%20help%20with%20electrical%20services." 
     class="floating-whatsapp" 
     target="_blank" 
     title="Chat with us on WhatsApp">
    <img src="https://img.icons8.com/color/48/000000/whatsapp--v1.png" alt="WhatsApp" />
  </a>

  <footer>
    &copy; 2025 Mojo Electrical Enterprise. All rights reserved.
  </footer>

  <!-- ✅ Load EmailJS SDK v4 -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="form-validation.js"></script>
</body>
</html>
